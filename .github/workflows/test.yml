name: Test process_omol25

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openmpi-bin libopenmpi-dev

    - name: Install Python dependencies
      run: uv sync --extra dev

    - name: MPI Diagnostics
      run: |
        mpirun --version
        uv run python -c "import mpi4py; print(mpi4py.get_config()); from mpi4py import MPI; print(f'MPI Version: {MPI.Get_library_version()}')"

    - name: Create dummy login file for tests
      run: |
        echo '{"user": "dummy", "access_key": "dummy", "secret_key": "dummy"}' > psdi-argonne-omol25-ro.json

    - name: Run tests with coverage
      env:
        OMPI_MCA_rmaps_base_oversubscribe: 1
        PRTE_MCA_rmaps_base_oversubscribe: 1
      run: |
        uv run pytest tests/ | tee pytest-coverage.txt

    - name: Update Coverage Badge in README
      if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        COVERAGE=$(grep "TOTAL" pytest-coverage.txt | awk '{print $NF}' | sed 's/%//')
        echo "Detected coverage: ${COVERAGE}%"
        sed -i "s|coverage-[0-9]\+%|coverage-${COVERAGE}%|g" README.md

        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        git diff --staged --quiet || (git commit -m "docs: update coverage badge to ${COVERAGE}% [skip ci]" && git push)
